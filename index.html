<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>欠席連絡アプリ</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4CAF50">

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    input, select, button {
      margin: 6px 0;
      padding: 10px;
      width: 100%;
      max-width: 320px;
      font-size: 16px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2>欠席連絡</h2>

<input id="name" placeholder="苗字">
<input id="grade" placeholder="学年">
<input id="part" placeholder="パート">

<label>日付</label><br>
<select id="month"></select> 月
<select id="day"></select> 日<br>

<select id="status">
  <option value="欠席">欠席</option>
  <option value="遅刻">遅刻</option>
  <option value="早退">早退</option>
</select>

<input id="reason" placeholder="理由">

<button onclick="send()">送信</button>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js")
    .then(() => console.log("SW登録成功"))
    .catch(err => console.log("SW登録失敗", err));
}

// 月
for (let i = 1; i <= 12; i++) {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  document.getElementById("month").appendChild(opt);
}

// 日
for (let i = 1; i <= 31; i++) {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  document.getElementById("day").appendChild(opt);
}

// 今日を初期値
const today = new Date();
document.getElementById("month").value = today.getMonth() + 1;
document.getElementById("day").value = today.getDate();

// 0埋め
function pad(n) {
  return String(n).padStart(2, "0");
}

// 送信
async function send() {
  const name = document.getElementById("name").value.trim();
  const grade = document.getElementById("grade").value.trim();
  const part = document.getElementById("part").value.trim();
  const reason = document.getElementById("reason").value.trim();

  const month = pad(document.getElementById("month").value);
  const day = pad(document.getElementById("day").value);
  const date = month + "-" + day;

  if (!name) {
    alert("名前を入力してね");
    return;
  }

  const data = {
    name,
    grade,
    part,
    date,
    status: document.getElementById("status").value,
    reason
  };

  try {
    const res = await fetch("/api/absence", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (!res.ok) throw new Error();

    alert("送信成功！");
  } catch (e) {
    alert("送信失敗...");
    console.error(e);
  }
}
</script>

</body>
</html>
