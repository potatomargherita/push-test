<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>部活アプリ</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    input, select, button {
      margin: 6px 0;
      padding: 10px;
      width: 100%;
      max-width: 320px;
      font-size: 16px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
    }
    h2 {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>部活アプリ</h1>

<!-- 通知 -->
<h2>通知</h2>
<button onclick="start()">通知を有効化</button>

<hr>

<!-- 欠席フォーム -->
<h2>欠席連絡</h2>

<input id="name" placeholder="苗字">
<select id="grade">
  <option value="">学年を選択</option>
  <option value="1年">1年</option>
  <option value="2年">2年</option>
</select>

<select id="part">
  <option value="">パートを選択</option>
  <option value="Fl">Fl</option>
  <option value="Cl">Cl</option>
  <option value="Sax">Sax</option>
  <option value="Tp">Tp</option>
  <option value="Tb">Tb</option>
  <option value="Hr">Hr</option>
  <option value="Bass">Bass</option>
  <option value="Perc">Perc</option>
</select>

<label>日付</label><br>
<select id="month"></select> 月
<select id="day"></select> 日<br>

<select id="status">
  <option value="欠席">欠席</option>
  <option value="遅刻">遅刻</option>
  <option value="早退">早退</option>
  <option value="ミー早">ミー早</option>
  <option value="中抜け">中抜け</option>
</select>

<input id="reason" placeholder="理由">

<button onclick="sendAbsence()">送信</button>

<script>
const publicKey = "BI3cHWxxzzPjgEI7V4Nw5HIA0lrFWK3PFw0a2LR8qMRIg26GLru9R3jefP15ZJNjVMj9zu_JLkO_2O_knVNd5bI";
const SERVER_URL = "https://push-server-j72o.onrender.com/subscribe";

// ===== 通知（←ここは元のまま）=====
async function start() {
  const permission = await Notification.requestPermission();
  if (permission !== "granted") return;

  const reg = await navigator.serviceWorker.register("sw.js");
  await navigator.serviceWorker.ready;

  const convertedKey = urlBase64ToUint8Array(publicKey);

  try {
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: convertedKey
    });

    await fetch(SERVER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(sub)
    });

    alert("通知登録完了！");

  } catch (e) {
    alert("エラー: " + e);
  }
}

// ===== フォーム用 =====

// 月
for (let i = 1; i <= 12; i++) {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  document.getElementById("month").appendChild(opt);
}

// 日
for (let i = 1; i <= 31; i++) {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  document.getElementById("day").appendChild(opt);
}

// 今日をデフォルト
const today = new Date();
document.getElementById("month").value = today.getMonth() + 1;
document.getElementById("day").value = today.getDate();

// 0埋め
function pad(n) {
  return String(n).padStart(2, "0");
}

// 送信
async function sendAbsence() {

  const name = document.getElementById("name").value.trim();
  if (!name) {
    alert("名前を入力してね");
    return;
  }

  const month = pad(document.getElementById("month").value);
  const day = pad(document.getElementById("day").value);

  const data = {
    name: name,
    grade: document.getElementById("grade").value,
    part: document.getElementById("part").value,
    date: "'" + month + "-" + day,
    status: document.getElementById("status").value,
    reason: document.getElementById("reason").value
  };

  try {
    await fetch("https://push-server-j72o.onrender.com/api/absence", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    alert("送信成功！");
  } catch (e) {
    alert("送信失敗...");
    console.error(e);
  }
}

// ===== 共通 =====
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, '+')
    .replace(/_/g, '/');

  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}
</script>

</body>
</html>
