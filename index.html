<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Push通知</title>
  <link rel="manifest" href="manifest.json">
</head>

<body>

<h1>Push通知テスト</h1>

<button onclick="start()">通知を有効化</button>

<script>
const publicKey = "BI3cHWxxzzPjgEI7V4Nw5HIA0lrFWK3PFw0a2LR8qMRIg26GLru9R3jefP15ZJNjVMj9zu_JLkO_2O_knVNd5bI";
const GAS_URL = "https://script.google.com/macros/s/AKfycbyBZLegcV8mJ_JXGzvTZ9kC2Q3p3BAqQb80chNl9SEIYyZvUFVi3WXHXGtnZU8j3DeO/exec"; // ←追加

async function start() {
  alert("① スタート");

  const permission = await Notification.requestPermission();
  alert("② 許可: " + permission);

  if (permission !== "granted") return;

  const reg = await navigator.serviceWorker.register("sw.js");

  await navigator.serviceWorker.ready;
  alert("③ SW準備OK");

  const convertedKey = urlBase64ToUint8Array(publicKey);

  try {
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: convertedKey
    });

    alert("④ 登録成功！！");

    // 🔥 GASに送信
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(sub)
    });

    alert("⑤ 保存: " + await res.text());

  } catch (e) {
    alert("エラー: " + e);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, '+')
    .replace(/_/g, '/');

  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}
</script>

</body>
</html>
