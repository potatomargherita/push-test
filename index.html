<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>部活アプリ</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }
    input, select, button {
      margin: 6px 0;
      padding: 10px;
      width: 100%;
      max-width: 320px;
      font-size: 16px;
    }
    button {
      background: #4CAF50;
      color: white;
      border: none;
    }
    h2 {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<!-- ===== メニュー画面 ===== -->
<div id="menu">
  <h1>部活アプリ</h1>
  <button onclick="goForm()">欠席連絡送信</button>
  <button onclick="goAdmin()">管理者ページ</button>
</div>

<!-- ===== フォーム画面 ===== -->
<div id="formPage" style="display:none;">
  <h1>欠席連絡</h1>

  <input id="name" placeholder="名前"><br>

  <select id="grade">
  <option value="" selected disabled>学年を選択</option>
  <option value="1年">1年</option>
  <option value="2年">2年</option>
  </select>
  

  <select id="part">
  <option value="" selected disabled>パートを選択</option>
  <option value="Fl">Fl</option>
  <option value="Cl">Cl</option>
  <option value="Sax">Sax</option>
  <option value="Trp">Trp</option>
  <option value="Trb">Trb</option>
  <option value="Hr">Hr</option>
  <option value="Bass">Bass</option>
  <option value="Perc">Perc</option>
  </select><br>

  月：
  <select id="month">
    <option value="" disabled selected>月</option>
    <script>
      for (let i = 1; i <= 12; i++) {
        const m = String(i).padStart(2, "0");
        document.write(`<option value="${m}">${m}</option>`);
      }
    </script>
  </select>

日：
  <select id="day">
    <option value="" disabled selected>日</option>
    <script>
      for (let i = 1; i <= 31; i++) {
        const d = String(i).padStart(2, "0");
        document.write(`<option value="${d}">${d}</option>`);
      }
    </script>
  </select><br>

  <select id="status">
    <option value="欠席">欠席</option>
    <option value="遅刻">遅刻</option>
    <option value="遅刻">早退</option>
    <option value="遅刻">ミー早</option>
    <option value="遅刻">中抜け</option>
  </select><br>

  <input id="reason" placeholder="理由"><br>

  <button onclick="sendAbsence()">送信</button>
  <button onclick="goMenu()">戻る</button>
</div> 

<div id="adminPage" style="display:none;">
  <h1>管理者ページ</h1>

  <input type="password" id="adminPass" placeholder="パスワード">

  <button onclick="checkPass()">ログイン</button>

  <div id="adminContent" style="display:none;">
    <h2>管理者機能</h2>
    <button onclick="start()">通知を有効化</button>
  </div>

  <button onclick="goMenu()">戻る</button>
</div>


<script>
const publicKey = "BI3cHWxxzzPjgEI7V4Nw5HIA0lrFWK3PFw0a2LR8qMRIg26GLru9R3jefP15ZJNjVMj9zu_JLkO_2O_knVNd5bI";
const SERVER_URL = "https://push-server-j72o.onrender.com/subscribe";

// メニュー → フォーム

async function goForm() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("formPage").style.display = "block";

  // 🔥 サーバー起動（wake）
  try {
    await fetch(SERVER + "/wake");
  } catch (e) {
    console.log("wake失敗（無視OK）");
  }
}

// フォーム → メニュー
function goMenu() {
  document.getElementById("menu").style.display = "block";
  document.getElementById("formPage").style.display = "none";
  document.getElementById("adminPage").style.display = "none";
}
  
// ===== 通知（←ここは元のまま）=====
async function start() {
  const permission = await Notification.requestPermission();
  if (permission !== "granted") return;

  const reg = await navigator.serviceWorker.register("sw.js");
  await navigator.serviceWorker.ready;

  const convertedKey = urlBase64ToUint8Array(publicKey);

  try {
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: convertedKey
    });

    await fetch(SERVER_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(sub)
    });

    alert("通知登録完了！");

  } catch (e) {
    alert("エラー: " + e);
  }
}

// ===== フォーム用 =====

// 月
for (let i = 1; i <= 12; i++) {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  document.getElementById("month").appendChild(opt);
}

// 日
for (let i = 1; i <= 31; i++) {
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  document.getElementById("day").appendChild(opt);
}

// 今日をデフォルト
const today = new Date();
document.getElementById("month").value = today.getMonth() + 1;
document.getElementById("day").value = today.getDate();

// 0埋め
function pad(n) {
  return String(n).padStart(2, "0");
}

// 送信
async function sendAbsence() {

  const name = document.getElementById("name").value.trim();
  if (!name) {
    alert("名前を入力してね");
    return;
  }

  const month = pad(document.getElementById("month").value);
  const day = pad(document.getElementById("day").value);

  const data = {
    name: name,
    grade: document.getElementById("grade").value,
    part: document.getElementById("part").value,
    date: "'" + month + "-" + day,
    status: document.getElementById("status").value,
    reason: document.getElementById("reason").value
  };

  try {
    await fetch("https://push-server-j72o.onrender.com/api/absence", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });

    alert("送信成功！");
  } catch (e) {
    alert("送信失敗...");
    console.error(e);
  }
}

// ===== 共通 =====
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding)
    .replace(/-/g, '+')
    .replace(/_/g, '/');

  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

const ADMIN_PASSWORD = "0923"; // ←好きに変えてOK
function goAdmin() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("adminPage").style.display = "block";
}

function checkPass() {
  const input = document.getElementById("adminPass").value;
  if (input === ADMIN_PASSWORD) {
    document.getElementById("adminContent").style.display = "block";
    document.getElementById("adminPass").value = "";
    alert("ログイン成功");
  } else {
    alert("パスワード違う");
  }
}
</script>

</body>
</html>
